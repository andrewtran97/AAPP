name: Bug report
description: Report a reproducible defect
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What failed?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Exact commands, fixtures, and outputs.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, branch, commit.
    validations:
      required: true

  - type: textarea
    id: boundary
    attributes:
      label: Boundary / safety impact
      description: Does this affect policy, evidence, identity, claims, or runtime behavior?
    validations:
      required: true
