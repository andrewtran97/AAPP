name: Agent Security Automation

on: [pull_request]

permissions:
  contents: write
  actions: write

jobs:
  agent-security-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Ruby scope monitor
        env:
          H1_API_TOKEN: ${{ secrets.H1_API_TOKEN }}
        run: ruby scripts/scope_monitor.rb
